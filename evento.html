<!DOCTYPE html>
<html>
<head>
  <title>Event Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    :root {
      --primary-color: #f48fb1;
      --primary-dark: #d81b60;
      --text-color: #5d4037;
      --bg-gradient: radial-gradient(circle at top right, #fff0f5 0%, #ffe4e1 100%);
      --card-bg: #ffffff;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .background-decor {
      position: absolute;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
      top: 0;
      left: 0;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
    }

    .circle-1 { width: 300px; height: 300px; top: -100px; left: -100px; }
    .circle-2 { width: 400px; height: 400px; bottom: -150px; right: -100px; background: rgba(244, 143, 177, 0.1); }

    #container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      background-color: var(--card-bg);
      padding: 30px 20px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(216, 27, 96, 0.1);
      border: 2px solid #fff;
      margin-bottom: 20px;
      box-sizing: border-box;
      position: relative;
    }

    #container::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px dashed var(--primary-color);
      border-radius: 20px;
      pointer-events: none;
    }

    .animation-container {
      position: relative;
      width: 80%;
      max-width: 250px;
      margin: 0 auto 20px;
      z-index: 1;
    }

    .papas-img {
      position: relative;
      z-index: 2;
      width: 100%;
      display: block;
    }

    .baby-head-img {
      position: absolute;
      top: 45%;
      left: 10%;
      width: 45%;
      z-index: 1;
      animation: peekaboo 5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }

    @keyframes peekaboo {
      0%, 60%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      70%, 90% { transform: translate(-50%, 10%) rotate(-20deg); opacity: 1; }
    }

    .info-img {
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
    }

    .info-container {
      width: 100%;
      margin: 10px 0 30px;
      position: relative;
      z-index: 1;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.8em;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .baby-name {
      font-family: 'Dancing Script', cursive;
      font-size: 4em;
      margin: 0 0 20px 0;
      color: var(--primary-dark);
      text-transform: none;
      letter-spacing: 0;
      text-shadow: 2px 2px 0px #fff;
    }

    .date-container {
      margin: 20px 0;
      padding: 15px 0;
      border-top: 1px solid var(--primary-color);
      border-bottom: 1px solid var(--primary-color);
      width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    .month {
      font-size: 1.2em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .date-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .date-row > div {
      font-weight: 600;
    }

    .date-number {
      font-size: 3em;
      line-height: 1;
    }

    .day, .time {
      font-size: 1.1em;
      color: var(--primary-dark);
    }

    .address {
      font-size: 1.1em;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .registry {
      font-size: 1.1em;
      font-weight: 600;
      line-height: 1.4;
    }
    
    .registry strong {
      font-size: 1.4em;
    }

    #usernameMessage {
      font-family: 'Dancing Script', cursive;
      font-size: 2.3em;
      color: var(--primary-dark);
      margin: 20px 0;
      text-shadow: 2px 2px 0px #fff;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    #buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }

    .event-button {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 16px 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1.2em;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 8px 20px rgba(216, 27, 96, 0.25);
      transition: all 0.3s ease;
      width: 100%;
    }

    .event-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(216, 27, 96, 0.35);
      background: linear-gradient(135deg, #f06292 0%, #c2185b 100%);
    }

    .event-button:active {
      transform: translateY(1px);
      box-shadow: 0 5px 15px rgba(216, 27, 96, 0.25);
    }

    .modal {
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto; 
      background-color: rgba(255, 230, 238, 0.85);
    }
    .modal-content {
      font-family: 'Outfit', sans-serif;
      background-color: #fefefe;
      margin: 15% auto; 
      padding: 30px 20px;
      border: 2px solid #ffccd5;
      border-radius: 20px;
      width: 85%;
      max-width: 400px; 
      box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
    }
    .modal-content h2 {
      color: var(--primary-dark);
      font-family: 'Dancing Script', cursive;
      font-size: 2.5em;
      margin-top: 0;
      text-align: center;
    }
    .close {
      color: #f48fb1;
      float: right;
      font-size: 32px;
      font-weight: bold;
      margin-top: -15px;
      transition: color 0.3s;
    }
    .close:hover,
    .close:focus {
      color: #d81b60;
      text-decoration: none;
      cursor: pointer;
    }
    #leaderboardContent {
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
      font-size: 1.1em;
      color: var(--text-color);
    }
    #leaderboardContent ol {
      padding-left: 20px;
    }
    #leaderboardContent li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <div id="container">
    
    <div class="animation-container">
      <img src="babyhead.png" class="baby-head-img" alt="Baby Head">
      <img src="papas.png" class="papas-img" alt="Parents">
    </div>

    <div id="usernameMessage"><span id="username"></span>, our baby will be arriving soon and we would love for you to join us!</div>
    
    <div class="info-container">
      <h2 class="subtitle">BABY SHOWER</h2>
      <h1 class="baby-name">Ena Yaretzi</h1>
      
      <div class="date-container">
        <div class="month">AUGUST</div>
        <div class="date-row">
          <div class="day">SUNDAY</div>
          <div class="date-number">04</div>
          <div class="time">4:00 PM</div>
        </div>
      </div>

      <div class="address">
        AMATE NO 146, FRACC. FLORESTA
      </div>
      
      <div class="registry">
        LIVERPOOL EVENT NO.<br>
        <strong>51443073</strong>
      </div>
    </div>

    <div id="buttons">
      <button class="event-button" id="playAudioBtn">Play Song</button>
      <button class="event-button" id="mapBtn">Show Map</button>
      <button class="event-button" id="rsvpBtn">RSVP</button>
      <button class="event-button" id="leaderboardBtn">Show Leaderboard</button>
    </div>
  </div>

  <audio id="backgroundAudio" src="evento.mp3" loop></audio>
   
  <!-- Leaderboard Modal -->
  <div id="leaderboardModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Leaderboard</h2>
      <div id="leaderboardContent"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', (event) => {
      const username = localStorage.getItem('username') || 'Guest';
      document.getElementById('username').textContent = username;

      document.getElementById('mapBtn').onclick = () => {
        window.location.href = 'https://maps.app.goo.gl/dttQPYbaKw7dV9ZF9';
      };
      document.getElementById('rsvpBtn').onclick = () => {
        window.location.href = 'https://forms.gle/rN7WDC8KfidWPBCcA';
      };
      const audio = document.getElementById('backgroundAudio');
      const firebaseConfig = {
        apiKey: "AIzaSyCs12jzrMo80XXe5ITKMUJsZdneyP7TfN0",
        authDomain: "leaderboard-8c89c.firebaseapp.com",
        projectId: "leaderboard-8c89c",
        storageBucket: "leaderboard-8c89c.appspot.com",
        messagingSenderId: "453053651134",
        appId: "1:453053651134:web:045849c17dfc853bcfe6ef"
      };
      firebase.initializeApp(firebaseConfig);
      
      const db = firebase.firestore();

      document.getElementById('playAudioBtn').onclick = () => {
        audio.play().catch(e => console.log("Audio play failed:", e));
      };
      
      const leaderboardModal = document.getElementById('leaderboardModal');
      const leaderboardBtn = document.getElementById('leaderboardBtn');
      const closeBtn = document.getElementsByClassName('close')[0];

      leaderboardBtn.onclick = function() {
        fetchAndDisplayLeaderboard();
        leaderboardModal.style.display = "block";
      }

      closeBtn.onclick = function() {
        leaderboardModal.style.display = "none";
      }

      window.onclick = function(event) {
        if (event.target == leaderboardModal) {
          leaderboardModal.style.display = "none";
        }
      }

      async function fetchAndDisplayLeaderboard() {
        try {
          const leaderboardRef = db.collection('leaderboard');
          const snapshot = await leaderboardRef.orderBy('score', 'desc').limit(50).get();
          
          const leaderboard = snapshot.docs.map(doc => ({
            name: doc.data().name,
            score: doc.data().score
          }));
          
          const leaderboardContent = document.getElementById('leaderboardContent');
          leaderboardContent.innerHTML = '<ol></ol>';
          const ol = leaderboardContent.querySelector('ol');
          
          leaderboard.forEach((entry) => {
            const li = document.createElement('li');
            li.textContent = `${entry.name}: ${entry.score}`;
            ol.appendChild(li);
          });
        } catch (error) {
          console.error("Error fetching leaderboard:", error);
          document.getElementById('leaderboardContent').innerHTML = '<p>Error loading leaderboard. Please try again later.</p>';
        }
      }
    });
  </script>
</body>
</html>
