<!DOCTYPE html>
<html>
<head>
  <title>My Baby Shower - Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <!-- Add Firestore SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    body {
      font-family: 'Dancing Script', cursive;
      text-align: center;
      background: linear-gradient(to bottom, pink, white);
      background-image: url(hearts.png);
      color: #333;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden; /* Avoid scrollbars on mobile */
    }
    #container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    h1 {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      z-index: 10;
      pointer-events: none; /* Let clicks pass to canvas */
      color: #d81b60;
      text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
      margin: 0;
      font-size: 2.5rem;
    }
    #gameCanvas {
      background-color: #000;
      display: block;
      width: 100%;
      height: 100%;
    }
    #buttons {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      width: 90%;
      max-width: 400px;
    }
    .game-button {
      background-color: #d81b60;
      color: white;
      padding: 15px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
      font-size: 1.5rem;
      font-family: 'Dancing Script', cursive;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: background-color 0.3s;
    }
    .game-button:hover {
      background-color: #c2185b;
    }
    #gameOverMsg {
      display: none;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      color: #d81b60;
      text-shadow: 2px 2px 5px rgba(255,255,255,0.9);
      z-index: 10;
      pointer-events: none;
      margin: 0;
    }
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(255, 230, 238, 0.85); /* Soft pink overlay instead of blur/glass */
    }
    .modal-content {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      color: #5d4037;
      background-color: #fff;
      margin: 15% auto;
      padding: 30px 20px;
      border: 2px solid #ffccd5;
      border-radius: 20px;
      width: 85%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
    }
    .close {
      color: #f48fb1;
      float: right;
      font-size: 32px;
      font-weight: bold;
      margin-top: -20px;
      margin-right: -5px;
      transition: color 0.3s;
    }
    .close:hover,
    .close:focus {
      color: #d81b60;
      text-decoration: none;
      cursor: pointer;
    }
    #siguienteBtn {
      background: linear-gradient(135deg, #f48fb1 0%, #d81b60 100%);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(216, 27, 96, 0.2);
      transition: transform 0.2s, box-shadow 0.3s;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
    }
    #siguienteBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(216, 27, 96, 0.3);
    }
  </style>
</head>
<audio id="backgroundMusic" loop>
  <source src="gameaudio.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>
<body>
  <div id="container">
    <canvas id="gameCanvas"></canvas>
    <div id="buttons">
      <button class="game-button" id="startGameBtn">Start</button>
      <button class="game-button" id="continueBtn" style="display:none;">Continue</button>
    </div>
    <div id="gameOverMsg">Game Over</div>
  </div>
  <!-- Modal Structure -->
  <div id="customModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p id="modalMessage"></p>
      <button id="siguienteBtn">Next</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const spermImg = new Image();
    spermImg.src = 'spermheadnobg.png'; // Replace with your image path

    const spermTailImg = new Image();
    spermTailImg.src = 'spermtailnobg.png'; // Replace with your image path

    const whiteCellImg = new Image();
    whiteCellImg.src = 'whitecellbestnobg.png'; // Replace with your image path

    const wallImg = new Image();
    wallImg.src = 'wall.png'; // Replace with your image path

    const flippedWallImg = new Image();
    flippedWallImg.src = 'flippedwall.png';

    const backgroundImage = new Image();
    backgroundImage.src = 'gamebg5.png'; // Replace with your image path

    const backgroundMusic = document.getElementById("backgroundMusic");
    const firebaseConfig = {
  apiKey: "AIzaSyCs12jzrMo80XXe5ITKMUJsZdneyP7TfN0",
  authDomain: "leaderboard-8c89c.firebaseapp.com",
  projectId: "leaderboard-8c89c",
  storageBucket: "leaderboard-8c89c.appspot.com",
  messagingSenderId: "453053651134",
  appId: "1:453053651134:web:045849c17dfc853bcfe6ef"
};
    firebase.initializeApp(firebaseConfig);
    
    // Get a reference to the Firestore database
    const db = firebase.firestore();

    let sperm, whiteCells, score, gameState, gameSpeed, distanceTraveled;
    let wallPositions, wallGap, startTime;
    let spawnRate, spawnTimer, baseSpeed, speedIncrement;
    const userName = localStorage.getItem("username") || 'Player';
    let leaderboard = [];
    let backgroundX = 0;
    let sessionID = Date.now().toString();
    
    function getSpeechMessage(currentScore) {
      if (currentScore < 250) {
        return [
          `${userName}, pls help me reach my goal!`,
          `${userName}, watch out for those white cells!`,
          `Keep swimming, ${userName}!`
        ][Math.floor(Math.random() * 3)];
      } else if (currentScore < 500) {
        return [
          `${userName}, I think we are almost there!`,
          `${userName}, we can do it! Don't give up!`,
          `Whoa, that was close, ${userName}!`
        ][Math.floor(Math.random() * 3)];
      } else if (currentScore < 1500) {
        return [
          `${userName}, do not fail me we are so close!`,
          `Luke Skywalker would be proud, ${userName}!`,
          `Use the force, ${userName}!`
        ][Math.floor(Math.random() * 3)];
      } else {
        return [
          `${userName}, we are going warp speed!`,
          `Are you secretly a pro gamer, ${userName}?`,
          `To infinity and beyond, ${userName}!`
        ][Math.floor(Math.random() * 3)];
      }
    }
    
    let activeSpeech = false;
    let currentSpeechMessage = "";
    let lastSpeechTime = 0;
    const speechDuration = 3500; // Bubble stays for 3.5 seconds
    const speechCooldown = 4000; // 4 seconds between bubbles

    class Sperm {
      constructor() {
        this.x = 100;
        this.y = canvas.height / 2;
        this.radius = 12;
        this.velocity = 0;
        this.gravity = 0.25;
        this.lift = -6;
        this.tailAngle = 0;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.tailAngle);

        // Draw the tail
        ctx.drawImage(spermTailImg, -this.radius * 3.5, -this.radius * 0.5, this.radius * 3, this.radius);

        // Draw the head
        ctx.drawImage(spermImg, -this.radius, -this.radius, this.radius * 2, this.radius * 2);

        ctx.restore();
      }

      update() {
        this.velocity += this.gravity;
        this.y += this.velocity;

        if (this.y + this.radius > canvas.height) {
          this.y = canvas.height - this.radius;
          this.velocity = 0;
        } else if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.velocity = 0;
        }

        if (gameState === "dying") {
          this.tailAngle += 0.5; // Spin frantically
          this.x -= gameSpeed; // Drift back
        } else {
          // Improved tail animation: faster and wider flap
          this.tailAngle = Math.sin(Date.now() * 0.02) * 0.4;
        }
      }

      flap() {
        this.velocity = this.lift;
      }
    }

    class WhiteCell {
      constructor(x, y, speed) {
        this.x = x;
        this.y = y;
        this.radius = 12; // Smaller radius for white cells
        this.speed = speed;
        this.angle = 0; // Rotation angle
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.drawImage(whiteCellImg, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
        ctx.restore();
      }

      update() {
        this.x -= this.speed;
        this.angle += 0.05; // Rotate slightly each frame
      }
    }

    // Initialize game variables
    function initGame() {
      // Set canvas size to screen size
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      sperm = new Sperm();
      whiteCells = [];
      score = 0;
      gameState = "menu";
      gameSpeed = canvas.width / 200; // Scale speed with width
      distanceTraveled = 0;
      wallPositions = [];
      distanceTraveled = 0;
      wallPositions = [];
      wallGap = canvas.height * 0.6; // Gap proportional to screen height
      baseSpeed = canvas.width / 200;
      speedIncrement = 0.03;
      backgroundSpeed = 1; // Reset background speed

      startTime = null; // Reset start time
      spawnRate = 75; // Initial spawn rate for white cells
      spawnTimer = 0;

      // Initialize walls with a smooth wave-like motion
      for (let i = 0; i < canvas.width; i++) {
        let angle = (i / canvas.width) * Math.PI * 2;
        wallPositions[i] = {
          top: canvas.height / 6 + Math.sin(angle) * 20, // Reduced height
          bottom: (canvas.height / 6) * 5 + Math.sin(angle + Math.PI) * 20 // Reduced height
        };
      }

      // Initial sperm position
      sperm.x = canvas.width * 0.15; // Proportional x position
      sperm.y = canvas.height / 2;
      while (sperm.y - sperm.radius < wallPositions[Math.floor(sperm.x)].top || sperm.y + sperm.radius > wallPositions[Math.floor(sperm.x)].bottom) {
        sperm.y = Math.random() * (canvas.height - sperm.radius * 2) + sperm.radius;
      }
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (gameState === 'menu' || gameState === 'gameover') {
         initGame();
      }
    });

    // Start game
    function startGame() {
      localStorage.setItem("username", userName);
      initGame();
      gameState = "playing";
      startTime = Date.now(); // Record the start time
      document.getElementById("startGameBtn").style.display = "none";
      document.getElementById("continueBtn").style.display = "none";
      document.getElementById("gameOverMsg").style.display = "none";
      backgroundMusic.play(); // Start playing background music
      loop();
    }

    // Main game loop
    function loop() {
      updateGame();
      drawGame();

      if (gameState === "playing" || gameState === "dying") {
        requestAnimationFrame(loop);
      }
    }

    // Update game logic
    function updateGame() {
      sperm.update();

      if (gameState === "dying") return; // Stop updating walls and cells when dying

      // Update background position
      backgroundX -= backgroundSpeed;
      if (backgroundX <= -canvas.width) {
          backgroundX = 0;
      }

      // Update wall positions
      for (let i = 0; i < canvas.width; i++) {
        if (!wallPositions[i]) wallPositions[i] = { top: 0, bottom: canvas.height };
        let angle = ((Date.now() - startTime) * 0.002 + (i / canvas.width) * Math.PI * 2) % (Math.PI * 2);
        wallPositions[i].top = canvas.height / 6 + Math.sin(angle) * 20 + Math.sin(Date.now() * 0.003) * 20; // Smooth motion
        wallPositions[i].bottom = (canvas.height / 6) * 5 + Math.sin(angle + Math.PI) * 20 + Math.cos(Date.now() * 0.003) * 20; // Smooth motion
      }

      // Check for collisions with walls
      for (let i = 0; i < canvas.width; i++) {
        if (sperm.x + sperm.radius > i && sperm.x - sperm.radius < i + 1 &&
          (sperm.y - sperm.radius < wallPositions[i].top || sperm.y + sperm.radius > wallPositions[i].bottom)) {
          gameOver();
        }
      }

      // Spawn white cells sporadically and then more frequently
      spawnTimer += gameSpeed;
      if (spawnTimer >= spawnRate) {
        whiteCells.push(new WhiteCell(canvas.width + 100, Math.random() * canvas.height, baseSpeed + Math.random()));
        spawnTimer = 0;
        if (spawnRate > 500) {
          spawnRate -= 50; // Decrease spawn rate gradually
        }
      }

      // Update white cells
      for (let i = 0; i < whiteCells.length; i++) {
        whiteCells[i].update();

        // Check for collisions with sperm
        let dx = sperm.x - whiteCells[i].x;
        let dy = sperm.y - whiteCells[i].y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < sperm.radius + whiteCells[i].radius) {
          gameOver();
        }

        // Remove off-screen white cells
        if (whiteCells[i].x + whiteCells[i].radius < 0) {
          whiteCells.splice(i, 1);
          i--;
        }
      }

      // Calculate score based on distance traveled
      distanceTraveled += gameSpeed;
      score = Math.floor(distanceTraveled / 10); // Adjust score calculation as needed

      // Speech bubble logic
      let now = Date.now();
      if (!activeSpeech && now - lastSpeechTime > speechCooldown) {
         activeSpeech = true;
         currentSpeechMessage = getSpeechMessage(score);
         lastSpeechTime = now;
      } else if (activeSpeech && now - lastSpeechTime > speechDuration) {
         activeSpeech = false;
         lastSpeechTime = now;
      }
    }
    async function updateLeaderboard() {
  try {
    const leaderboardRef = db.collection('leaderboard');
    const snapshot = await leaderboardRef.orderBy('score', 'desc').limit(50).get();

    let leaderboard = snapshot.docs.map(doc => ({
      id: doc.id,
      name: doc.data().name,
      score: doc.data().score
    }));

    // Check if the current score is higher than the lowest score in the top 50
    if (leaderboard.length < 50 || score > leaderboard[leaderboard.length - 1].score) {
      // Add new score to the leaderboard
      const newScoreRef = await leaderboardRef.add({
        name: userName,
        score: score,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        sessionID: sessionID
      });

      // If leaderboard exceeds 50 entries, remove the lowest score
      if (leaderboard.length >= 50) {
        await leaderboardRef.doc(leaderboard[leaderboard.length - 1].id).delete();
      }
    }
  } catch (error) {
    console.error("Error updating leaderboard:", error);
  }
}

async function fetchLeaderboard() {
  try {
    const leaderboardRef = db.collection('leaderboard');
    const snapshot = await leaderboardRef.orderBy('score', 'desc').limit(50).get();
    
    leaderboard = snapshot.docs.map(doc => ({
      name: doc.data().name,
      score: doc.data().score
    }));
    
    // Commented out since leaderboard display is not needed here
    // displayLeaderboard();
  } catch (error) {
    console.error("Error fetching leaderboard:", error);
  }
}
    // Game Over
    function gameOver() {
      if (gameState === "gameover" || gameState === "dying") return; // Ensure only one entry per session
    
      gameState = "dying";
      sperm.velocity = -5; // Bounce up slightly on death
      backgroundSpeed = 0;
      
      // Show dying message
      activeSpeech = true;
      currentSpeechMessage = `Noooo we were so close ${userName}!`;
      lastSpeechTime = Date.now();
      
      setTimeout(() => {
        gameState = "gameover";
        document.getElementById("gameOverMsg").style.display = "block";
        document.getElementById("startGameBtn").style.display = "block";
        document.getElementById("continueBtn").style.display = "block";
        document.getElementById("startGameBtn").textContent = "Play Again";
        backgroundMusic.pause();
        backgroundMusic.currentTime = 0;
      
        updateLeaderboard(); // Update Firestore leaderboard
      }, 2000);
    }
    

    // Draw game elements on canvas
    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw moving background
      ctx.drawImage(backgroundImage, backgroundX, 0, canvas.width, canvas.height);
      ctx.drawImage(backgroundImage, backgroundX + canvas.width, 0, canvas.width, canvas.height);
      
      // Draw walls with smooth edges
      ctx.fillStyle = "pink";
      ctx.beginPath();
      ctx.moveTo(0, wallPositions[0].top); // Start from the top-left corner

      // Draw top wall with flipped image
      for (let i = 0; i < canvas.width; i++) {
        ctx.drawImage(flippedWallImg, i, 0, 1, wallPositions[i].top);
        
        // Draw bottom wall
        ctx.drawImage(wallImg, i, wallPositions[i].bottom, 1, canvas.height - wallPositions[i].bottom);
      }

      // Draw sperm
      sperm.draw();

      // Draw white cells
      for (let whiteCell of whiteCells) {
        whiteCell.draw();
      }

      // Draw score
      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText("Score: " + score, 10, 30);
      
      // Draw speech bubble
      if ((gameState === "playing" || gameState === "dying") && activeSpeech) {
        ctx.save();
        // Position bubble slightly above and to the right of sperm
        ctx.translate(sperm.x + sperm.radius, sperm.y - sperm.radius - 15);
        
        ctx.font = "bold 16px 'Outfit', sans-serif";
        let textWidth = ctx.measureText(currentSpeechMessage).width;
        let paddingX = 15;
        let paddingY = 10;
        let bubbleW = textWidth + paddingX * 2;
        let bubbleH = 16 + paddingY * 2; 
        let bubbleX = 10; // Offset to the right
        let bubbleY = -bubbleH;
        
        // Draw bubble background
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.strokeStyle = "rgba(216, 27, 96, 0.6)";
        ctx.lineWidth = 2;
        
        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 15);
        } else {
            ctx.rect(bubbleX, bubbleY, bubbleW, bubbleH);
        }
        ctx.fill();
        ctx.stroke();
        
        // Draw bubble tail
        ctx.beginPath();
        ctx.moveTo(bubbleX + 15, bubbleY + bubbleH);
        ctx.lineTo(bubbleX + 5, bubbleY + bubbleH + 15);
        ctx.lineTo(bubbleX + 25, bubbleY + bubbleH);
        ctx.fill();
        ctx.stroke();
        
        // Fix tail overlap line
        ctx.beginPath();
        ctx.moveTo(bubbleX + 16, bubbleY + bubbleH);
        ctx.lineTo(bubbleX + 24, bubbleY + bubbleH);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.stroke();
        
        // Draw text
        ctx.fillStyle = "#d81b60";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(currentSpeechMessage, bubbleX + bubbleW/2, bubbleY + bubbleH/2);
        
        ctx.restore();
      }
    }
    

    // Event listeners
    document.addEventListener("touchstart", (event) => {
      if (gameState === "playing") {
        sperm.flap();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" && gameState === "playing") sperm.flap();
    });

    document.getElementById("startGameBtn").addEventListener("click", startGame);
    document.getElementById("continueBtn").addEventListener("click", handleContinue);

    function updateModalMessage() {
  const modalMessage = document.getElementById("modalMessage");
  modalMessage.textContent = `Thanks for trying, ${userName}. Luckily I made it and my parents are eagerly waiting for me. If you want to play again to improve your score, close this window and click "Play Again"... who knows, maybe there's a prize... or not... my dad is very cheap =P. If you're tired of losing, click "Next" to see the event info.`;
}
    function handleContinue() {
  updateModalMessage();
  document.getElementById("customModal").style.display = "block";
}
    // Close the modal when the user clicks on <span> (x)
    document.querySelector(".close").addEventListener("click", () => {
      document.getElementById("customModal").style.display = "none";
    });

    // When the user clicks on "Siguiente" button, redirect to the third page
    document.getElementById("siguienteBtn").addEventListener("click", () => {
      window.location.href = "evento.html"; // Replace with the actual URL of the third page
    });

  
    // Initial setup
    initGame(); 
    fetchLeaderboard(); // Fetch leaderboard on page load
    document.getElementById("startGameBtn").textContent = "Start"; // Initial button text
  </script>
</body>
</html>
